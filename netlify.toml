[build]
  functions = "netlify/functions"
  publish = "."

# Redirect all /api/* calls to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — serve index.html for any unmatched path
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "PORT,NODE_VERSION"
  SECRETS_SCAN_OMIT_PATHS = "check_browser.js,debug_chat.js,test_openrouter.js,test_models.js,test_models2.js,test_openai.js,seed.js,server.js,server_log.txt"

